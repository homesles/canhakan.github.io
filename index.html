<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Hakan | Photography</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        .hero { 
            height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.1), #000), 
            url('https://i.postimg.cc/xkgCjrWg/MG-3907-Dx-O-Deep-PRIME-XD2s-(2).jpg');
            background-size: cover; background-position: center 30%;
        }

        h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 100; margin: 0; letter-spacing: -2px; }

        nav { 
            position: sticky; top: 0; background: rgba(0,0,0,0.95); padding: 30px 0; 
            display: flex; justify-content: center; gap: 50px; border-bottom: 1px solid #1a1a1a; z-index: 100;
        }
        .nav-btn { 
            background: none; border: none; color: #444; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 4px; font-size: 11px; transition: 0.3s;
            padding-bottom: 8px; border-bottom: 2px solid transparent;
        }
        .nav-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        .gallery { 
            max-width: 1600px; margin: 50px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; 
        }
        .photo-card { border-radius: 2px; overflow: hidden; background: #0a0a0a; transition: 0.4s; }
        .photo-card img { width: 100%; height: auto; display: block; object-fit: contain; }
        
        .hidden { display: none !important; }
        footer { padding: 120px 20px; text-align: center; color: #333; font-size: 10px; letter-spacing: 4px; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Can Hakan</h1>
        <p style="letter-spacing: 10px; color: #777; font-size: 12px; margin-top: 15px;">WILDLIFE & CONCERTS</p>
    </section>

    <nav>
        <button id="btn-wildlife" class="nav-btn active" onclick="showGallery('wildlife')">Wildlife</button>
        <button id="btn-concert" class="nav-btn" onclick="showGallery('concert')">Concerts</button>
    </nav>

    <main id="wildlife-gallery" class="gallery">
        <div class="photo-card"><img src="https://i.postimg.cc/xkgCjrWg/MG-3907-Dx-O-Deep-PRIME-XD2s-(2).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/d7n1QMzB/MG-3230-(3).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/WdGzKqSc/MG-3751-Dx-O-Deep-PRIME-XD2s-(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/MctTZkhs/MG-3970-Dx-O-Deep-PRIME-XD2s-(2).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/XZxJNMTh/MG-3971-Dx-O-Deep-PRIME-XD2s-(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/YG9ShnHD/IMG-7686-(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/LJKhN3ty/MG-0259-(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/rDXzQN1P/MG-2792-Dx-O-Deep-PRIME-XD2s.jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/BjTbyPN9/MG-2990-Dx-O-Deep-PRIME-XD2s-(1).jpg"></div>
    </main>

    <main id="concert-gallery" class="gallery hidden">
        <div class="photo-card"><img src="https://i.postimg.cc/FfGRFt2w/20250711-230652(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/PpxqP3jF/20250711-220026-(1).jpg"></div>
        <div class="photo-card"><img src="https://i.postimg.cc/ZBRqC7mR/20250711-224335-(2).jpg"></div>
    </main>

    <footer>CAN HAKAN PHOTOGRAPHY &copy; 2026 • INSTAGRAM @HOMESLES</footer>

    <script>
        function showGallery(type) {
            document.getElementById('wildlife-gallery').classList.toggle('hidden', type !== 'wildlife');
            document.getElementById('concert-gallery').classList.toggle('hidden', type !== 'concert');
            document.getElementById('btn-wildlife').classList.toggle('active', type === 'wildlife');
            document.getElementById('btn-concert').classList.toggle('active', type === 'concert');
        }
    </script>
</body>
</html>
